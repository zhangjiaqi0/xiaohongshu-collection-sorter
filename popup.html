<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书收藏分类</title>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #52c41a;
    }
    .status-text {
      font-size: 14px;
      color: #666;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      text-align: center;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #666;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #e8e8e8;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">★</div>
    <div class="title">收藏自动分类</div>
  </div>
  
  <div class="status">
    <div class="status-icon"></div>
    <div class="status-text">已启用 · 自动识别分类</div>
  </div>
  
  <button class="btn btn-primary" id="openOptions">设置分类</button>
  
  <div class="footer">v1.0.0</div>
  
  <script src="popup.js"></script>
</body>
</html>
