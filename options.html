<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 小红书收藏分类</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 24px;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e8e8e8;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .category-item {
      padding: 16px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .category-name {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
    }
    .category-name:focus {
      outline: none;
      border-color: #FF6B6B;
    }
    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
      transition: background 0.2s;
    }
    .btn-icon:hover {
      background: #f0f0f0;
    }
    .btn-icon.delete:hover {
      background: #fff2f0;
      color: #FF6B6B;
    }
    .keywords-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      font-family: inherit;
    }
    .keywords-input:focus {
      outline: none;
      border-color: #FF6B6B;
    }
    .keywords-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: #fff;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    .btn-secondary:hover {
      background: #f5f5f5;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">★</div>
    <div class="title">收藏自动分类设置</div>
  </div>
  
  <div class="section">
    <div class="section-title">分类管理</div>
    
    <div id="categoryList" class="category-list">
    </div>
    
    <button class="btn btn-primary" id="addCategory" style="width: 100%; margin-top: 12px;">
      + 添加分类
    </button>
    
    <div class="actions">
      <button class="btn btn-secondary" id="resetDefaults">恢复默认</button>
      <button class="btn btn-primary" id="saveSettings">保存设置</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script src="utils.js"></script>
  <script src="options.js"></script>
</body>
</html>
